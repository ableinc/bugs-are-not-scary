# =========================
# HTTPS Server
# =========================
server {
    server_name itsnotscary.org www.itsnotscary.org;

    # Root site
    root /app/its-not-scary;
    index index.html;

    # =========================
    # Security + Performance
    # =========================
    server_tokens off;

    # Rate limiting / connection limiting
    limit_req zone=req_limit_per_ip burst=20 nodelay;
    limit_conn conn_limit_per_ip 10;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; media-src 'self'; connect-src 'self';" always;

    # =========================
    # Reverse proxy for CDN audio (avoids CORS)
    # =========================
    location /media/ {
        proxy_pass https://able.sfo2.cdn.digitaloceanspaces.com/itsnotscary/;
        proxy_set_header Host able.sfo2.cdn.digitaloceanspaces.com;
        proxy_ssl_server_name on;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
        access_log off;
        expires 7d;
    }

    # =========================
    # Static Assets (Caching)
    # =========================
    location /assets/ {
        access_log off;
        expires 7d;
        etag on;
    }

    location /css/ {
        access_log off;
        expires 7d;
        etag on;
    }

    location /js/ {
        access_log off;
        expires 7d;
        etag on;
    }

    # =========================
    # Gzip Compression
    # =========================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/itsnotscary.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/itsnotscary.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}


server {
    if ($host = www.itsnotscary.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = itsnotscary.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name itsnotscary.org www.itsnotscary.org;
    listen 80;
    return 404; # managed by Certbot
}
